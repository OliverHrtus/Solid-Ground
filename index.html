<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solid Ground - Stavebná firma</title>
    <link rel="icon" type="image/png" href="Logo.png">
</head>
<style>
     html,
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        width: 100%;
    }

    * {
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        color: #333;
    }

    header {
        background-color: #fff;
        border-bottom: 1px solid #e5e5e5;
        padding: 14px 20px;
    }

    .header-inner {
        max-width: 1200px;
        display: flex;
        margin: 0 auto;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
    }

    .logo {
        height: 125px;
    }

    nav {
        background: none;
    }

    .primary-nav {
        list-style: none;
        display: flex;
        align-items: center;
        gap: 24px;
    }

    .primary-nav a {
        color: #111;
        text-decoration: none;
        font-weight: 800;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 8px 12px;
        border-radius: 6px;
        transition: background-color 0.2s ease, color 0.2s ease;
    }

    .primary-nav a:hover {
        background-color: #d7e3ff;
        color: #0b3ea8;
    }

    nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
    }

    nav li {
        margin: 0 16px;
    }

    nav a {
        color: white;
        text-decoration: none;
    }

    .hero {
        background-image: url('https://www.eurolineslovakia.sk/img/projects/ObrRD_2004/Aktual_422/ak_422.jpg');
        background-size: cover;
        background-position: center;
        height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        position: relative;
    }

    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1;
    }

    .hero h1 {
        position: relative;
        z-index: 2;
        font-size: 64px;
        letter-spacing: 0.02em;
    }

    .services {
        padding: 32px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .services h2 {
        width: 100%;
        margin-bottom: 16px;
    }

    .services-buttons {
        display: flex;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
    }

    .services-buttons a {
        text-decoration: none;
        color: inherit;
    }

    .service {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 16px;
        width: 280px;
        margin: 16px;
        padding: 16px;
        background-color: rgb(230, 215, 0);
        border: 2px solid rgb(227, 212, 0);
        border-radius: 25px;
        cursor: pointer;
        font-size: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.5s ease;
        transform-origin: center center;
    }

    .service-icon {
        width: 80px;
        height: 80px;
        object-fit: cover;
    }

    .service:hover {
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        transform: scale(1.1);
        background-color: white;
    }

    footer {
        background-color: rgb(230, 215, 0);
        text-align: center;
        padding: 10px;
        width: 100%;
    }
</style>


<body>
   <header>
        <div class="header-inner">
            <a href="index.html"><img class="logo" src="Logo.png" alt="Logo"></a>
            <nav>
                <ul class="primary-nav">
                    <li><a href="index.html">Úvod</a></li>
                    <li><a href="#services">Služby</a></li>
                    <li><a href="o_nas.html">O nás</a></li>
                    <li><a href="kontakt.html">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div>
            <h1>Predávame.</h1>
            <h1>Pomáhame.</h1>
            <h1>Staviame.</h1>
        </div>
    </section>
    <section class="services" id="services">
        <h2>Naše služby</h2>
        <div class="services-buttons">

            <a href="stavebniny.html">
                <button class="service">
                    <img class="service-icon"
                        src="https://images.vexels.com/media/users/3/144979/isolated/preview/735350f8c67f852bf7e03b0051dc74f8-hammer-silhouette.png"
                        alt="Service Icon">
                    <h3>Stavebniny</h3>
                </button>
            </a>

            <a href="realizacia_stavieb.html">
                <button class="service">
                    <img class="service-icon" src="https://www.iconpacks.net/icons/1/free-wall-icon-1074-thumb.png"
                        alt="Service Icon">
                    <h3>Realizácia Stavieb</h3>
                </button>
            </a>

            <a href="doprava.html">
                <button class="service">
                    <img class="service-icon" src="https://www.iconpacks.net/icons/1/free-truck-icon-1058-thumb.png"
                        alt="Service Icon">
                    <h3>Doprava</h3>
                </button>
            </a>

        </div>
    </section>
    <footer>
        <p>&copy; 2026 Solid Ground</p>
    </footer>
</body>

</html>
