<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solid Ground - Construction Company</title>
    <link rel="icon" type="image/png" href="Images/FA$ION-LOGO_png.png">
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        color: #333;
    }

    header {
        background-color: #c4c4c4;
        color: white;
        padding: 10px;
        text-align: center;
    }

    .logo {
        height: 150px;
        background: rgba(255, 255, 255, 0);
    }

    nav {
        background-color: #9d9d9d;
        padding: 8px;
    }

    nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: center;
    }

    nav li {
        margin: 0 16px;
    }

    nav a {
        color: white;
        text-decoration: none;
    }

    .hero {
        background-image: url('https://safetyservicesdirect.com/wp-content/uploads/2018/07/shutterstock_67527154-1-scaled.jpg');
        background-size: cover;
        opacity: 0.8;
        background-position: center;
        height: 400px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
    }

    .hero h1 {
        font-size: 48px;
        margin: 0;
    }

    .services {
        padding: 32px;
        text-align: center;
    }

    .service {
        display: inline-block;
        width: 30%;
        margin: 16px;
        padding: 16px;
        background-color: rgb(230, 215, 0);
        border: 2px solid rgb(227, 212, 0);
        border-radius: 25px;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.5s ease;
        transform-origin: center center;
    }

    .service:hover {
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        transform: scale(1.1);
    }

    footer {
        background-color: rgb(230, 215, 0);
        color: white;
        text-align: center;
        padding: 16px;
    }
</style>


<body>
    <header>
        <img class="logo" src="Logo.png" alt="Logo">
    </header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <section class="hero">
        <div>
            <h1>Building Your Dreams</h1>
            <p>Quality construction services for residential and commercial projects.</p>
        </div>
    </section>
    <section class="services">
        <h2>Our Services</h2>
        <button class="service">
            <h3>Residential Construction</h3>
            <p>We build homes that stand the test of time.</p>
        </button>
        <button class="service">
            <h3>Commercial Projects</h3>
            <p>Expert construction for businesses and offices.</p>
        </button>
        <button class="service">
            <h3>Renovations</h3>
            <p>Upgrade and modernize your existing spaces.</p>
        </button>
    </section>
    <footer>
        <p>&copy; 2023 Solid Ground Construction. All rights reserved.</p>
    </footer>
</body>

</html>
